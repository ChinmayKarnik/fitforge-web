<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitForge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,600;0,700;0,800;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #0f1320;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }

    .container {
      max-width: 400px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Icon */
    .app-icon {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      margin-bottom: 24px;
    }

    /* App name */
    h1 {
      font-size: 38px;
      font-weight: 500;
      letter-spacing: -1px;
      color: #ffffff;
      margin-bottom: 10px;
    }

    /* Tagline */
    .tagline {
      font-size: 14px;
      font-weight: 400;
      color: rgba(255,255,255,0.58);
      letter-spacing: 0.3px;
      text-align: center;
      line-height: 1.7;
      margin-bottom: 48px;
    }

    /* Divider */
    .divider {
      width: 32px;
      height: 1px;
      background: rgba(255,255,255,0.12);
      margin-bottom: 48px;
    }

    /* Play button */
    .play-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #ffffff;
      text-decoration: none;
      padding: 14px 24px;
      border-radius: 14px;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .play-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.18);
    }

    .play-btn svg {
      width: 20px;
      height: 20px;
      opacity: 0.8;
      flex-shrink: 0;
    }

    .play-btn-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      line-height: 1.25;
    }

    .play-btn-sub {
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .play-btn-main {
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
    }

    /* Footer */
    footer {
      margin-top: 52px;
      font-size: 11px;
      color: rgba(255,255,255,0.15);
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <div class="container">

    <img class="app-icon" src="icon.png" alt="FitForge" />

    <h1>FitForge</h1>

    <p class="tagline">
      Track your workouts.<br/>
      See your progress. Stay consistent.
    </p>

    <div class="divider"></div>

    <a class="play-btn" href="https://play.google.com/store/apps" target="_blank">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M3.18 23.76c.3.17.64.24.98.21l13.08-11.91L13.88 8.7 3.18 23.76zM.93 1.4A1.55 1.55 0 0 0 .5 2.5v19c0 .39.15.76.43 1.1l.07.06 10.64-10.64v-.25L.93 1.4zm20.28 9.27-2.88-1.66-3.27 3.27 3.27 3.27 2.9-1.67c.83-.48.83-1.25-.02-1.21zM4.16.22l13.08 7.52-3.36 3.36L4.16.22z"/>
      </svg>
      <span class="play-btn-text">
        <span class="play-btn-sub">Get it on</span>
        <span class="play-btn-main">Google Play</span>
      </span>
    </a>

    <footer>© 2026 FitForge · Chinmay Karnik</footer>

  </div>
</body>
</html>
